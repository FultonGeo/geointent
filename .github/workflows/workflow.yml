name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,geopandas,postgis]"
      - run: pytest tests/ -m "not integration and not live and not realdata" -v

  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: nlgeo
          POSTGRES_DB: nlgeo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,geopandas,postgis]"
      - run: python tests/seed_db.py
        env:
          GEOINTENT_TEST_DB: postgresql://postgres:nlgeo@localhost:5432/nlgeo_test
      - run: pytest tests/ -m "integration and not live and not realdata" -v
        env:
          GEOINTENT_TEST_DB: postgresql://postgres:nlgeo@localhost:5432/nlgeo_test
